# nginx vhost for petition-api.axogames.dev
# Reverse-proxies to the api_server.py listening on 127.0.0.1:8765.

server {
    listen 80;
    listen [::]:80;
    server_name petition-api.axogames.dev;

    # Let certbot put its ACME challenges here; everything else redirects to HTTPS.
    location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name petition-api.axogames.dev;

    # certbot will fill these in / replace this file
    ssl_certificate     /etc/letsencrypt/live/petition-api.axogames.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/petition-api.axogames.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:5m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # JSON API
    location /api/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /healthz {
        proxy_pass http://127.0.0.1:8765/healthz;
        access_log off;
    }

    # Root: tiny placeholder
    location = / {
        default_type text/plain;
        return 200 "petition-tracker API. Use /api/state.json\n";
    }

    location / { return 404; }
}
