name: Poll petition + publish dashboard

on:
  schedule:
    # GitHub Actions cron minimum cadence is 5 minutes. Note that scheduled
    # workflows can be delayed during periods of high GitHub Actions load.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}  # manual run button on the Actions tab
  push:
    branches: [main]
    paths:
      - ".github/workflows/poll.yml"
      - "scraper.py"
      - "news.py"
      - "render_html.py"
      - "graph.py"
      - "db.py"

# Allow only one in-flight job so we don't race on the committed DB
concurrency:
  group: poll
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  poll-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Poll petition (single fetch + insert)
        run: |
          python - <<'PY'
          from db import connect, insert_reading, latest_total
          from scraper import fetch_counts
          reading = fetch_counts()
          conn = connect()
          prev = latest_total(conn)
          if prev != reading["total"]:
              insert_reading(conn, reading)
              print(f"Inserted: total={reading['total']} delta={reading['total'] - (prev or 0)}")
          else:
              print(f"Unchanged: total={reading['total']}")
          conn.close()
          PY

      - name: Refresh news feed (cooldown-gated)
        continue-on-error: true
        run: |
          python - <<'PY'
          from news import refresh_news
          # Allow every run since the workflow itself is 5-min cadence
          print(refresh_news(min_interval_seconds=0))
          PY

      - name: Render static dashboard
        run: |
          mkdir -p public
          python graph.py --html public/index.html --static
          cp signatures.db public/signatures.db || true

      - name: Commit updated DB to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add signatures.db
          if git diff --staged --quiet; then
            echo "No DB changes to commit"
          else
            git commit -m "data: poll $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
